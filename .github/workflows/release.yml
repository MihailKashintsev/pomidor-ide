name: Release Pomidor IDE

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Pomidor compiler on Windows
        if: runner.os == 'Windows'
        run: gcc compiler/pomidor.c -o compiler/pomidor.exe

      - name: Build Pomidor compiler on Unix
        if: runner.os != 'Windows'
        run: |
          gcc compiler/pomidor.c -o compiler/pomidor
          chmod +x compiler/pomidor

      - name: Build and publish
        run: npm run build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
