name: Build Pomidor IDE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Pomidor compiler on Windows
        if: runner.os == 'Windows'
        run: gcc compiler/pomidor.c -o compiler/pomidor.exe

      - name: Build Pomidor compiler on Unix
        if: runner.os != 'Windows'
        run: |
          gcc compiler/pomidor.c -o compiler/pomidor
          chmod +x compiler/pomidor

      - name: Build app
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pomidor-ide-${{ runner.os }}
          path: dist/**
